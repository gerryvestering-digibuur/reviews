
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DigiBuur Reviews</title>
  <meta name="description" content="Ervaringen van ondernemers met DigiBuur AI-automatisering." />
  <style>
    :root{
      --bg1:#1a0533;
      --bg2:#0f1b3d;
      --bg3:#0a1628;
      --white:#ffffff;
      --text:#d1d5db;
      --muted:#9ca3af;
      --muted2:#6b7280;
      --purple:#a78bfa;
      --purple2:#8b5cf6;
      --purple3:#7c3aed;
      --blue:#4f46e5;
      --blue2:#3b82f6;
      --yellow:#facc15;
      --border:rgba(139,92,246,0.15);
      --cardbg:linear-gradient(145deg, rgba(139,92,246,0.08), rgba(59,130,246,0.05));
      --pillbg:linear-gradient(135deg, rgba(139,92,246,0.2), rgba(59,130,246,0.2));
      --ctabg:linear-gradient(135deg, #7c3aed, #4f46e5);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      color:var(--white);
      font-family:Inter,"Segoe UI",system-ui,sans-serif;
      background:linear-gradient(135deg,var(--bg1) 0%,var(--bg2) 40%,var(--bg3) 100%);
    }

    .page{
      width:100%;
      min-height:100vh;
      padding:24px;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
    }

    .header{
      text-align:center;
      margin-bottom:40px;
    }

    .header h1{
      margin:0 0 12px;
      font-size:clamp(2rem,5vw,3.5rem);
      line-height:1.05;
      font-weight:800;
      background:linear-gradient(135deg,#a855f7,#6366f1,#3b82f6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
      color:transparent;
    }

    .header p{
      margin:0 auto;
      max-width:700px;
      color:var(--muted);
      font-size:1.1rem;
      line-height:1.6;
    }

    .tabs{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-bottom:40px;
    }

    .tab{
      border:none;
      cursor:pointer;
      padding:12px 20px;
      border-radius:999px;
      font-size:14px;
      font-weight:600;
      transition:.25s ease;
      color:#9ca3af;
      background:transparent;
      border:1px solid rgba(255,255,255,0.1);
    }

    .tab:hover{
      color:#fff;
      border-color:rgba(255,255,255,0.25);
    }

    .tab.active{
      color:#fff;
      background:linear-gradient(135deg,#7c3aed,#4f46e5);
      box-shadow:0 12px 30px rgba(168,85,247,.22);
      border-color:transparent;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:24px;
    }

    .card{
      border-radius:24px;
      padding:24px;
      background:var(--cardbg);
      border:1px solid var(--border);
      backdrop-filter:blur(10px);
      transition:transform .25s ease, box-shadow .25s ease;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 40px rgba(0,0,0,.18);
    }

    .card-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:16px;
    }

    .name{
      margin:0 0 4px;
      font-size:1.1rem;
      font-weight:700;
      color:#fff;
    }

    .role{
      margin:0 0 3px;
      color:#d8b4fe;
      font-size:.92rem;
    }

    .practice{
      margin:0;
      color:var(--muted2);
      font-size:.78rem;
    }

    .stars{
      white-space:nowrap;
      font-size:16px;
      letter-spacing:1px;
      color:var(--yellow);
    }

    .review-text{
      margin:0 0 18px;
      color:var(--text);
      font-size:.96rem;
      line-height:1.75;
    }

    .result{
      display:inline-block;
      padding:8px 12px;
      border-radius:999px;
      font-size:.78rem;
      font-weight:700;
      background:var(--pillbg);
      color:var(--purple);
      border:1px solid rgba(139,92,246,0.25);
    }

    .cta{
      text-align:center;
      margin-top:48px;
    }

    .cta p{
      margin:0 0 16px;
      color:var(--muted);
    }

    .cta a{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:14px 26px;
      border-radius:999px;
      color:#fff;
      text-decoration:none;
      font-weight:700;
      background:var(--ctabg);
      transition:transform .2s ease, box-shadow .2s ease;
      box-shadow:0 10px 30px rgba(124,58,237,.24);
    }

    .cta a:hover{
      transform:scale(1.04);
    }

    .footer{
      text-align:center;
      margin-top:32px;
      padding-top:24px;
      border-top:1px solid rgba(255,255,255,0.05);
      color:#6b7280;
      font-size:.78rem;
    }

    @media (max-width: 900px){
      .grid{
        grid-template-columns:1fr;
      }
      .page{
        padding:20px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="wrap">
      <div class="header">
        <h1>Ervaringen van ondernemers</h1>
        <p>Dit is wat er gebeurt als routinewerk uit je handen verdwijnt.</p>
      </div>

      <div class="tabs" id="tabs"></div>
      <div class="grid" id="reviewsGrid"></div>

      <div class="cta">
        <p>Ook benieuwd wat AI voor jouw praktijk kan doen?</p>
        <a
          href="https://wa.me/31610702521?text=Hoi%20DigiBuur!%20Ik%20wil%20meer%20weten%20over%20AI-automatisering."
          target="_blank"
          rel="noopener noreferrer"
        >
          💬 Start een gesprek via WhatsApp
        </a>
      </div>

      <div class="footer">
        © DigiBuur.nl — AI-Automatisering voor ondernemers
      </div>
    </div>
  </div>

  <script>
    const reviewsData = {
      fysio: {
        label: "Fysio & Medische Praktijken",
        reviews: [
          {
            name: "Dr. Marieke van den Berg",
            role: "Fysiotherapeut",
            practice: "FysioFit Amsterdam",
            rating: 5,
            text: "Sinds DigiBuur onze afsprakenplanning en patiëntcommunicatie heeft geautomatiseerd, besparen we wekelijks 12 uur aan administratie. Onze no-show rate is met 40% gedaald dankzij de slimme herinneringen.",
            result: "40% minder no-shows",
          },
          {
            name: "Jeroen Bolt",
            role: "Praktijkhouder",
            practice: "Medisch Centrum Oost",
            rating: 5,
            text: "De AI-receptionist van DigiBuur beantwoordt 80% van de telefoontjes zelfstandig. Patiënten zijn enthousiast en mijn team kan zich focussen op zorg in plaats van telefoonverkeer.",
            result: "80% minder telefoondruk",
          },
          {
            name: "Sandra de Vries",
            role: "Manueel Therapeut",
            practice: "Praktijk De Groot",
            rating: 4,
            text: "Ik was sceptisch over AI, maar het intake-formulier en de automatische opvolging werken perfect. Nieuwe patiënten voelen zich meteen welkom en gehoord.",
            result: "30% meer nieuwe patiënten",
          },
          {
            name: "Tom Hendriks",
            role: "Sportfysiotherapeut",
            practice: "SportRevalidatie Friesland",
            rating: 5,
            text: "DigiBuur heeft een chatbot gebouwd die sporters direct advies geeft over blessurepreventie. Dit trekt nieuwe klanten aan én ontlast onze intake enorm.",
            result: "25% groei in klantenbasis",
          },
        ],
      },
      tandarts: {
        label: "Tandarts & Mondzorg",
        reviews: [
          {
            name: "Dr. Fatima El Amrani",
            role: "Tandarts",
            practice: "Tandzorg Leeuwarden",
            rating: 5,
            text: "De geautomatiseerde herinnerings-flow van DigiBuur heeft onze no-show rate bijna geëlimineerd. Patiënten krijgen WhatsApp-herinneringen en kunnen met één klik bevestigen of verzetten.",
            result: "90% minder no-shows",
          },
          {
            name: "Peter Visser",
            role: "Praktijkmanager",
            practice: "Kliniek Visser Mondzorg",
            rating: 5,
            text: "Voorheen waren we 2 uur per dag kwijt aan het bellen van patiënten. Nu draait alles automatisch. De ROI was al in de eerste maand zichtbaar.",
            result: "€2.500/maand bespaard",
          },
          {
            name: "Lisa Jansen",
            role: "Mondhygiënist",
            practice: "Fresh Smile Studio",
            rating: 4,
            text: "De AI-content die DigiBuur voor onze social media maakt is verrassend goed. We krijgen nu wekelijks nieuwe aanmeldingen via Instagram zonder dat we zelf hoeven te posten.",
            result: "3x meer social media leads",
          },
          {
            name: "Dr. Wouter de Vries",
            role: "Kaakchirurg",
            practice: "MKA Kliniek Noord",
            rating: 5,
            text: "Het verwijsproces met huisartsen verliep altijd rommelig. DigiBuur heeft dit volledig gedigitaliseerd — verwijzingen komen nu gestructureerd binnen en worden direct verwerkt.",
            result: "60% snellere verwijzingen",
          },
        ],
      },
      beauty: {
        label: "Beauty & Med-Spa",
        reviews: [
          {
            name: "Nadia Rousseau",
            role: "Eigenaar",
            practice: "Glow Aesthetics",
            rating: 5,
            text: "DigiBuur heeft mijn complete boekingssysteem geautomatiseerd inclusief upselling van behandelingen. Mijn omzet is met 35% gestegen terwijl ik minder werk aan administratie.",
            result: "35% omzetstijging",
          },
          {
            name: "Kim van der Berg",
            role: "Schoonheidsspecialist",
            practice: "Pure Beauty Salon",
            rating: 5,
            text: "De follow-up berichten na behandelingen zijn een gamechanger. Klanten voelen zich speciaal en boeken sneller een vervolgafspraak. Mijn retentie is enorm verbeterd.",
            result: "50% hogere klantretentie",
          },
          {
            name: "Ilse Mulder",
            role: "Med-Spa Directeur",
            practice: "Radiance Med-Spa",
            rating: 5,
            text: "We gebruiken de AI-chatbot voor consultatie-aanvragen. Potentiële klanten krijgen direct antwoord op hun vragen over behandelingen, wat de drempel enorm verlaagt.",
            result: "45% meer consultaties",
          },
          {
            name: "Eva Kroon",
            role: "Huidtherapeut",
            practice: "Derma Glow Kliniek",
            rating: 4,
            text: "Het geautomatiseerde reviewverzoek na elke behandeling heeft ons Google-profiel een boost gegeven. We zijn van 3.8 naar 4.7 sterren gegaan in drie maanden.",
            result: "Van 3.8 naar 4.7 sterren",
          },
        ],
      },
    };

    let activeNiche = "fysio";

    const tabsEl = document.getElementById("tabs");
    const gridEl = document.getElementById("reviewsGrid");

    function stars(rating){
      let s = "";
      for(let i=1;i<=5;i++){
        s += i <= rating ? "★" : "☆";
      }
      return s;
    }

    function renderTabs(){
      tabsEl.innerHTML = "";
      Object.keys(reviewsData).forEach((key) => {
        const btn = document.createElement("button");
        btn.className = "tab" + (key === activeNiche ? " active" : "");
        btn.textContent = reviewsData[key].label;
        btn.addEventListener("click", () => {
          activeNiche = key;
          renderTabs();
          renderReviews();
        });
        tabsEl.appendChild(btn);
      });
    }

    function renderReviews(){
      const data = reviewsData[activeNiche];
      gridEl.innerHTML = data.reviews.map(review => `
        <div class="card">
          <div class="card-top">
            <div>
              <h3 class="name">${review.name}</h3>
              <p class="role">${review.role}</p>
              <p class="practice">${review.practice}</p>
            </div>
            <div class="stars" aria-label="${review.rating} van 5 sterren">${stars(review.rating)}</div>
          </div>
          <p class="review-text">"${review.text}"</p>
          <div class="result">📈 ${review.result}</div>
        </div>
      `).join("");
    }

    renderTabs();
    renderReviews();
  </script>
</body>
</html>
